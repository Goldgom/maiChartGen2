# RTX 5070 8GB 训练配置
seed: 42
device: cuda
precision: amp
compile: false
use_bf16: true

data:
  cache_root: cache
  num_workers: 4
  maxsubdiv: 64              # 谱面归一化网格精度（每拍分割数）
  slide_audio_cache_size: 1  # 8GB 显存：每 worker 最多缓存 1 首歌的完整 audio_memory

# EnCodec 音频编码参数
audio_encodec:
  n_layers: 1
  sample_rate: 24000
  bandwidth: 6.0

# 多尺度音频感知 (精简)
audio_multiscale:
  global_stride: 16           # 更大步长减少计算量
  local_window_s: 5.0
  local_slots_per_sec: 184
  local_dilation_base: 4
  max_spectral_len: 8192      # 减半序列长度
  use_spectral_sliding_window: true
  spectral_window_len: 2048
  spectral_window_stride: 1024

train:
  batch_size: 1
  max_turns: 100000
  log_every: 10
  eval_every_turns: 0          # 仅 epoch 时验证
  save_every_turns: 0          # 仅 epoch 时保存
  clip_grad_norm: 0.8
  offload_to_cpu: false
  grad_accum_steps: 4          # 小显存用梯度累积
  turn_batches: 4              # 每次 forward 数据量减半
  epochs_per_cycle: 1
  stages:
    stage1:
      batch_size: 1
      turn_batches: 4
      epochs_per_cycle: 1
      grad_accum_steps: 4
    touch:
      batch_size: 4
      turn_batches: 16
      epochs_per_cycle: 1
      grad_accum_steps: 1
    slide:
      batch_size: 4
      turn_batches: 8
      epochs_per_cycle: 1
      grad_accum_steps: 2
    hold:
      batch_size: 4
      turn_batches: 8
      epochs_per_cycle: 1
      grad_accum_steps: 2
    touch_hold:
      batch_size: 2
      turn_batches: 8
      epochs_per_cycle: 1
      grad_accum_steps: 2
    star:
      batch_size: 4
      turn_batches: 4
      epochs_per_cycle: 1
      grad_accum_steps: 2
    break:
      batch_size: 4
      turn_batches: 16
      epochs_per_cycle: 1
      grad_accum_steps: 1
    spike:
      batch_size: 4
      turn_batches: 16
      epochs_per_cycle: 1
      grad_accum_steps: 1

optim:
  name: adamw
  lr: 0.00015
  weight_decay: 0.01
  betas: [0.9, 0.95]
  stages:
    stage1:
      lr: 0.00015
    touch:
      lr: 0.0002
    slide:
      lr: 0.0003
    hold:
      lr: 0.0003
    touch_hold:
      lr: 0.0003
    star:
      lr: 0.0002
    break:
      lr: 0.0003
    spike:
      lr: 0.0003

sched:
  name: constant
  warmup_steps: 0
  min_lr: 0.00001
  stages:
    stage1:
      warmup_steps: 0
    touch:
      warmup_steps: 0
    slide:
      warmup_steps: 200
    hold:
      warmup_steps: 200
    touch_hold:
      warmup_steps: 200
    star:
      warmup_steps: 200
    break:
      warmup_steps: 0
    spike:
      warmup_steps: 0

checkpoint:
  dir: runs/5070_8g
  keep_last: 3
  best_metric: val_loss
  best_mode: min

val:
  max_val_level: 14.0
  val_ratio: 0.10
  seed: 42

# ═══════════════════════════════════════════════════════════════════════
# 模型参数 — 8GB 显存适配
# ═══════════════════════════════════════════════════════════════════════
# 估算总参数量: ~90M (bf16 ≈ 180MB 权重 + 2-3GB 激活/优化器)
# 4090 配置:     ~600M (bf16 ≈ 1.2GB 权重 + 8-10GB 激活)
models:
  stage1:
    hidden_dim: 384           # 768 → 384  (1/4 params)
    num_layers: 6             # 12 → 6
    num_heads: 6              # 12 → 6
    audio_stream_layers: 2    # 4 → 2
    audio_stream_heads: 6
    use_checkpoint: true      # 必须启用 checkpoint
    audio_vocab_size: 1027
    use_sliding_window: true
    window_tokens: 2048       # 4096 → 2048
    window_stride: 1024       # 2048 → 1024
    max_summary_tokens: 8     # 16 → 8
    summary_position: prefix
    detach_summary: true
    audio_window_tokens: 2048 # 4096 → 2048
    audio_global_summary_tokens: 8
  touch:
    hidden_dim: 384
    num_layers: 4
    num_heads: 6
  slide:
    hidden_dim: 256           # 512 → 256
    num_layers: 4             # 6 → 4
    num_heads: 4              # 8 → 4
    stage1_dim: 384           # 匹配 stage1 hidden_dim
  hold:
    hidden_dim: 192
    num_layers: 3
    num_heads: 4
    stage1_dim: 384
  touch_hold:
    hidden_dim: 192
    num_layers: 3
    num_heads: 4
    stage1_dim: 384
  star:
    hidden_dim: 192
    num_layers: 3
    num_heads: 4
    stage1_dim: 384
  break:
    hidden_dim: 192           # 384 → 192
    num_layers: 3             # 4 → 3
    num_heads: 4
    stage1_dim: 384
  spike:
    hidden_dim: 192
    num_layers: 3
    num_heads: 4
    stage1_dim: 384
