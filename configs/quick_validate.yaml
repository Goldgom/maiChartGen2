seed: 42
device: cuda
precision: amp
compile: false
use_bf16: false

data:
  cache_root: cache
  num_workers: 2

train:
  batch_size: 1
  turn_batches:
    stage1: 1
    touch: 1
    slide: 1
    break: 1
    spike: 1
  max_turns: 20
  log_every: 1
  eval_every_turns: 5
  save_every_turns: 1
  clip_grad_norm: 1.0
  offload_to_cpu: false
  grad_accum_steps: 1

optim:
  name: adamw
  lr: 0.0002
  weight_decay: 0.01
  betas: [0.9, 0.95]

sched:
  name: constant
  warmup_steps: 0
  min_lr: 0.00001

checkpoint:
  dir: runs/quick_validate
  keep_last: 2
  best_metric: loss
  best_mode: min

models:
  stage1:
    hidden_dim: 256
    num_layers: 4
    num_heads: 8
    audio_stream_layers: 2
    audio_stream_heads: 8
    use_checkpoint: true
  touch:
    hidden_dim: 256
    num_layers: 2
    num_heads: 8
  slide:
    hidden_dim: 256
    num_layers: 2
    num_heads: 8
  break:
    hidden_dim: 192
    num_layers: 2
    num_heads: 4
  spike:
    hidden_dim: 192
    num_layers: 2
    num_heads: 4
