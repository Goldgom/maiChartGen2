seed: 42
device: cuda
precision: amp
compile: false
use_bf16: true

data:
  cache_root: /data/maiG_v2/cache
  num_workers: 8              # 减少 worker 数量降低缓存副本
  prefetch_factor: 1          # 每 worker 只预取 1 个 batch（默认 2）
  detail_context_window: 512  # stage2/slide per-event local context rows; avoids full-song tensors per sample
  detail_hidden_cache_size: 0  # 禁用 _hidden 全量缓存（裁切后 clone，缓存无内存收益）
  slide_audio_cache_size: 0    # 禁用 audio 全量缓存
  stage2_star_shuffle: false   # keep same-chart events adjacent to avoid random-read stalls
  maxsubdiv: 64              # 谱面归一化网格精度，每 slot = 1/maxsubdiv 拍

# EnCodec 音频编码参数
audio_encodec:
  n_layers: 1         # codebook 层数 (1=75tok/s, 2=150tok/s)
  sample_rate: 24000  # 编码采样率
  bandwidth: 6.0      # 目标码率 kbps

# 多尺度音频感知
audio_multiscale:
  global_stride: 8          # 全局粗粒度降采样步长 (184/8≈23Hz)
  local_window_s: 5.0       # 局部细粒度感受野 (秒)
  local_slots_per_sec: 184  # chart grid 密度
  local_dilation_base: 4    # 膨胀卷积基数
  max_spectral_len: 16384   # 自注意力最大长度 (89s@184Hz)，超长歌插值降采样
  use_spectral_sliding_window: true
  spectral_window_len: 4096
  spectral_window_stride: 2048

train:
  batch_size: 1
  max_turns: 100000
  max_cpu_memory_gb: 32      # CPU 内存上限（GB），超限触发 DataLoader 重建 + 保存检查点；0 禁用
  mem_check_every_turns: 20  # 每 N turns 检查一次内存
  log_every: 10
  eval_every_turns: 0        # 0=仅在 epoch 完成时验证；>0=额外每 N turns 验证
  save_every_turns: 0        # 0=仅在 epoch 完成时保存；>0=额外每 N turns 保存
  clip_grad_norm: 0.8
  offload_to_cpu: false
  grad_accum_steps: 1
  turn_batches: 8
  epochs_per_cycle: 1        # 循环训练中每阶段每轮训练几个 epoch
  stages:
    stage1:
      batch_size: 1
      turn_batches: 8
      epochs_per_cycle: 1
      grad_accum_steps: 1
    stage2_star:
      batch_size: 2
      turn_batches: 16
      epochs_per_cycle: 1
      grad_accum_steps: 1
    touch:
      batch_size: 2
      turn_batches: 16
      epochs_per_cycle: 1
      grad_accum_steps: 1
    stage5_touch:
      batch_size: 2
      turn_batches: 16
      epochs_per_cycle: 1
      grad_accum_steps: 1
    slide:
      batch_size: 2
      turn_batches: 32
      epochs_per_cycle: 1
      grad_accum_steps: 1
    hold:
      batch_size: 16
      turn_batches: 16
      epochs_per_cycle: 1
      grad_accum_steps: 1
    touch_hold:
      batch_size: 16
      turn_batches: 16
      epochs_per_cycle: 1
      grad_accum_steps: 1
    break:
      batch_size: 2
      turn_batches: 32
      epochs_per_cycle: 1
      grad_accum_steps: 1
    stage6_break_note:
      batch_size: 2
      turn_batches: 32
      epochs_per_cycle: 1
      grad_accum_steps: 1
    spike:
      batch_size: 2
      turn_batches: 32
      epochs_per_cycle: 1
      grad_accum_steps: 1
    stage7_firework_note:
      batch_size: 2
      turn_batches: 32
      epochs_per_cycle: 1
      grad_accum_steps: 1

optim:
  name: adamw
  lr: 0.00015
  weight_decay: 0.01
  betas: [0.9, 0.95]
  stages:
    stage1:
      lr: 0.00015
    touch:
      lr: 0.0002
    slide:
      lr: 0.0003
    break:
      lr: 0.0003
    spike:
      lr: 0.0003
    hold:
      lr: 0.0003
    touch_hold:
      lr: 0.0003
    star:
      lr: 0.0002

sched:
  name: constant
  warmup_steps: 0
  min_lr: 0.00001
  stages:
    stage1:
      warmup_steps: 0
    touch:
      warmup_steps: 0
    slide:
      warmup_steps: 200      # bf16 + cross-attn 需要 warmup 稳定
    break:
      warmup_steps: 0
    spike:
      warmup_steps: 0
    hold:
      warmup_steps: 200
    touch_hold:
      warmup_steps: 200
    star:
      warmup_steps: 200

checkpoint:
  dir: /data/maiG_v2/runs/rotating_4090
  keep_last: 5
  best_metric: val_loss      # 用验证集 loss 判断最佳模型
  best_mode: min

# ── Train / Val 划分 ──
val:
  max_val_level: 14.0        # 验证集最高难度（< 此值的歌曲进入 val 候选池）
  val_ratio: 0.10            # 从低难度歌曲中抽多少比例做验证集（10%）
  seed: 42                   # 划分随机种子
  # split_file: splits/train_val_split.json  # 可选：从预生成的 JSON 读取划分

models:
  stage1:
    hidden_dim: 768
    num_layers: 12
    num_heads: 12
    audio_stream_layers: 4
    audio_stream_heads: 12
    use_checkpoint: true     # 长序列训练必须启用 decoder checkpoint
    audio_vocab_size: 1027    # n_layers=1→1027, n_layers=2→2051
    use_sliding_window: true
    window_tokens: 4096       # 谱面 decoder 每窗 token 数
    window_stride: 2048       # 滑动步长；window-stride 即窗口交集
    max_summary_tokens: 16    # 每滑出一个窗口步长，压缩成 1 个摘要，最多保留这些摘要
    summary_position: prefix  # 摘要放在窗口开头，让当前 token 可因果可见
    detach_summary: true      # 摘要不跨窗口反传，避免图随整首歌增长
    audio_window_tokens: 4096 # 当前窗口 cross-attn 的局部音频长度
    audio_global_summary_tokens: 16  # 全曲音频压缩缓存 token 数
  touch:
    hidden_dim: 768
    num_layers: 6
    num_heads: 12
  stage5_touch:
    hidden_dim: 384
    num_layers: 4
    num_heads: 6
    stage1_dim: 768
  slide:
    hidden_dim: 512
    num_layers: 6
    num_heads: 8
    max_path_len: 128
  break:
    hidden_dim: 384
    num_layers: 4
    num_heads: 6
  spike:
    hidden_dim: 384
    num_layers: 4
    num_heads: 6
  hold:
    hidden_dim: 384
    num_layers: 4
    num_heads: 6
  touch_hold:
    hidden_dim: 384
    num_layers: 4
    num_heads: 6
  star:
    hidden_dim: 384
    num_layers: 4
    num_heads: 6
