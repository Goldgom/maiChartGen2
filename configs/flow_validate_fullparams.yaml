seed: 42
device: cuda
precision: amp
compile: false
use_bf16: true

data:
  cache_root: /data/maiG_v2/cache
  num_workers: 2

audio_encodec:
  n_layers: 1
  sample_rate: 24000
  bandwidth: 6.0

audio_multiscale:
  global_stride: 8
  local_window_s: 5.0
  local_slots_per_sec: 184
  local_dilation_base: 4
  max_spectral_len: 16384
  use_spectral_sliding_window: true
  spectral_window_len: 4096
  spectral_window_stride: 2048

train:
  batch_size: 1
  max_turns: 100
  log_every: 1
  eval_every_turns: 0
  save_every_turns: 5
  clip_grad_norm: 0.8
  offload_to_cpu: false
  grad_accum_steps: 1
  turn_batches: 1
  cycle_turns: 2
  stages:
    stage1:
      turn_batches: 1
      cycle_turns: 2
      grad_accum_steps: 1
    touch:
      turn_batches: 1
      cycle_turns: 2
      grad_accum_steps: 1
    slide:
      turn_batches: 1
      cycle_turns: 2
      grad_accum_steps: 1
    break:
      turn_batches: 1
      cycle_turns: 2
      grad_accum_steps: 1
    spike:
      turn_batches: 1
      cycle_turns: 2
      grad_accum_steps: 1

optim:
  name: adamw
  lr: 0.00015
  weight_decay: 0.01
  betas: [0.9, 0.95]
  stages:
    stage1:
      lr: 0.00015
    touch:
      lr: 0.0002
    slide:
      lr: 0.0003
    break:
      lr: 0.0003
    spike:
      lr: 0.0003

sched:
  name: constant
  warmup_steps: 0
  min_lr: 0.00001
  stages:
    stage1:
      warmup_steps: 0
    touch:
      warmup_steps: 0
    slide:
      warmup_steps: 0
    break:
      warmup_steps: 0
    spike:
      warmup_steps: 0

checkpoint:
  dir: /data/maiG_v2/runs/flow_validate_fullparams
  keep_last: 2
  best_metric: loss
  best_mode: min

models:
  stage1:
    hidden_dim: 768
    num_layers: 12
    num_heads: 12
    audio_stream_layers: 4
    audio_stream_heads: 12
    use_checkpoint: true
    audio_vocab_size: 1027
    use_sliding_window: true
    window_tokens: 4096
    window_stride: 2048
    max_summary_tokens: 16
    summary_position: prefix
    detach_summary: true
    audio_window_tokens: 4096
    audio_global_summary_tokens: 16
  touch:
    hidden_dim: 768
    num_layers: 6
    num_heads: 12
  slide:
    hidden_dim: 512
    num_layers: 6
    num_heads: 8
  break:
    hidden_dim: 384
    num_layers: 4
    num_heads: 6
  spike:
    hidden_dim: 384
    num_layers: 4
    num_heads: 6
